name = "portfolio-worker-ggomez-page"
compatibility_date = "2026-03-13"
main = "./src/worker.ts"

[assets]
directory = "./dist/"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "404-page"

[observability]
[observability.logs]
enabled = true
head_sampling_rate = 0.5
invocation_logs = true

[observability.traces]
enabled = true
head_sampling_rate = 0.5

[env.production]
name = "portfolio-worker-ggomez-page"
routes = [
  { pattern = "gabogomez.dev", custom_domain = true },
  { pattern = "www.gabogomez.dev", custom_domain = true }
]